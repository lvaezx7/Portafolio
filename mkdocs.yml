site_name: Luis Vaez · AI Portfolio
site_description: Portfolio de AI & Data Science — Machine Learning, Deep Learning, Computer Vision, NLP y MLOps
site_url: https://lvaezx7.github.io/Portafolio/
repo_url: https://github.com/lvaezx7/Portafolio
repo_name: ia-portfolio
site_dir: site
docs_dir: docs

theme:
  name: material
  language: es
  logo: assets/logo.svg
  favicon: assets/logo.svg
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.sections
    - navigation.tabs
    - navigation.indexes
    - navigation.top
    - toc.integrate
    - content.code.copy
    - search.highlight
    - search.suggest
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Cambiar a modo claro
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Cambiar a modo oscuro

extra_css:
  - assets/extra.css

extra_javascript:
  - assets/extra.js

plugins:
  - search
  - awesome-pages
  - macros
  - git-revision-date-localized:
      enable_git_follow: false
      fallback_to_build_date: true

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - footnotes
  - toc:
      permalink: true
      toc_depth: 2-3
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.tasklist:
      custom_checkbox: true
      clickable_checkbox: true

edit_uri: blob/main/docs/

nav:
  - Inicio: index.md
  - "Acerca de mí": acerca.md
  - Portfolio:
      - Índice: portfolio/index.md
      - 'Publicación del sitio': 'portfolio/1Publicacion.md'

      - "01 · ML — EDA & Análisis":
          - 'Análisis Titanic (Principal)': 'portfolio/Practica1.md'
          - 'Palmer Penguins': 'portfolio/Practica1.2.md'
          - 'Tips Dataset — Negocio': 'portfolio/Practica1.3.md'

      - "02 · ML — Feature Engineering":
